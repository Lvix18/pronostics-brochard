/* ----------------------------------------------------------------
   Rétrocompatibilité : avant cette version, l'organisateur créait
   chaque match de phase finale à la main (ids "k<timestamp>", stockés
   dans official.knockout, dans un ORDRE QUI N'ÉTAIT PAS celui du tableau
   officiel) et les pronostics des joueurs étaient enregistrés sous ces
   mêmes ids. On ne supprime RIEN : on rattache chaque ancien match à la
   BONNE case de l'arbre officiel en comparant les ÉQUIPES (pas l'ordre
   de création), afin que les matchs déjà saisis et les pronostics déjà
   donnés se retrouvent à la place qui est réellement la leur.
   ---------------------------------------------------------------- */
function legacyTeamMatchMap(legacyArr, official){
  const map=new Map(); // ancien id -> nouvel id d'emplacement
  const used=new Set();
  const byRound={};
  (legacyArr||[]).forEach(m=>{ if(m&&m.round) (byRound[m.round]=byRound[m.round]||[]).push(m); });
  const results=(official&&official.results)||{};
  const slotOf=id=>BRACKET_SLOTS.find(s=>s.id===id);
  function localTeams(id){
    const slot=slotOf(id);
    if(!slot.feedsFrom) return { home:slot.defaultHome||"", away:slot.defaultAway||"" };
    const [f1,f2]=slot.feedsFrom;
    const t1=localTeams(f1), t2=localTeams(f2);
    const old1=[...map.entries()].find(([,sId])=>sId===f1);
    const old2=[...map.entries()].find(([,sId])=>sId===f2);
    const w1=knockoutWinner(old1?results[old1[0]]:null), w2=knockoutWinner(old2?results[old2[0]]:null);
    return {
      home: w1 ? (w1==="home"?t1.home:t1.away) : "",
      away: w2 ? (w2==="home"?t2.home:t2.away) : ""
    };
  }
  ["r32","r16","qf","sf","final"].forEach(round=>{
    const slots=BRACKET_SLOTS.filter(s=>s.round===round);
    (byRound[round]||[]).forEach(m=>{
      let best=null;
      slots.forEach(slot=>{
        if(used.has(slot.id)) return;
        const t=localTeams(slot.id);
        const setSlot=new Set([t.home,t.away].filter(Boolean));
        const setLegacy=new Set([m.home,m.away].filter(Boolean));
        if(setLegacy.size===0) return;
        let score=0; setLegacy.forEach(x=>{ if(setSlot.has(x)) score++; });
        if(score>0 && (!best||score>best.score)) best={slot,score};
      });
      if(best){ map.set(m.id, best.slot.id); used.add(best.slot.id); }
    });
  });
  return map;
}
/* Calcule, pour chaque emplacement de l'arbre officiel, les deux équipes (connues ou non),
   le résultat effectif et le pronostic de repli, et renvoie la liste complète des
   32 matchs (petite finale incluse) prête à l'emploi (scoring + affichage). */
function resolveBracket(official){
  const koTeams=(official&&official.koTeams)||{};
  const koKo=(official&&official.koKo)||{};
  const results=(official&&official.results)||{};
  const legacyArr=(official&&official.knockout)||[];
  const legacyById=new Map(legacyArr.map(m=>[m.id,m]));
  const legacyMap=legacyTeamMatchMap(legacyArr, official); // ancien id -> nouvel id (par équipes)
  const reverseLegacy=new Map(); legacyMap.forEach((slotId,oldId)=>reverseLegacy.set(slotId,oldId));

  const resultFor=id=>{
    const oldId=reverseLegacy.get(id);
    if(hasScore(results[id])) return results[id];
    if(oldId && hasScore(results[oldId])) return results[oldId];
    return results[id]||{};
  };
  const byId=new Map();
  const slotOf=id=>BRACKET_SLOTS.find(s=>s.id===id);
  function teamsFor(id){
    if(byId.has(id)) return byId.get(id);
    const slot=slotOf(id);
    const oldId=reverseLegacy.get(id);
    const legacyMatch=oldId?legacyById.get(oldId):null;
    const override=koTeams[id]||{};
    let home=override.home || (legacyMatch&&legacyMatch.home) || slot.defaultHome || "";
    let away=override.away || (legacyMatch&&legacyMatch.away) || slot.defaultAway || "";
    if(slot.feedsFrom && (!home || !away)){
      const [f1,f2]=slot.feedsFrom;
      const t1=teamsFor(f1), t2=teamsFor(f2);
      const w1=knockoutWinner(resultFor(f1)), w2=knockoutWinner(resultFor(f2));
      /* takesLosers (petite finale) : la case reçoit le PERDANT du match précédent, pas le vainqueur */
      const pick=(w,t)=> slot.takesLosers ? (w==="home"?t.away:t.home) : (w==="home"?t.home:t.away);
      if(!home) home = w1 ? pick(w1,t1) : "";
      if(!away) away = w2 ? pick(w2,t2) : "";
    }
    const v={home,away}; byId.set(id,v); return v;
  }
  return BRACKET_SLOTS.map(slot=>{
    const t=teamsFor(slot.id);
    const oldId=reverseLegacy.get(slot.id);
    const legacyMatch=oldId?legacyById.get(oldId):null;
    const num=(BRACKET_DISPLAY_ORDER[slot.round]||[]).indexOf(slot.id)+1;
    return {
      id:slot.id, round:slot.round,
      label:`${ROUNDS[slot.round].label} — Match ${num}`,
      home:t.home, away:t.away,
      ko: koKo[slot.id] || (legacyMatch&&legacyMatch.ko) || slot.defaultKo || "",
      legacyId: oldId||null,
      result: resultFor(slot.id)
    };
  });
}
/* Pronostic d'un joueur pour un match de phase finale : nouvel id en priorité (dès qu'il existe, même
   partiellement rempli), sinon ancien id (repli) — uniquement si le nouvel id n'a jamais été touché. */
const predFor=(preds,m)=>{ const p=(preds||{})[m.id]; return p!=null ? p : (m.legacyId ? (preds||{})[m.legacyId] : p); };

/* ----------------------------------------------------------------
   Ordre d'AFFICHAGE (emboîtement visuel) de chaque tour : contrairement
   à l'ordre des numéros de match FIFA (73,74,75…), pour qu'un arbre se
   lise correctement il faut que les deux cases qui se rejoignent au
   tour suivant soient toujours listées côte à côte. Cet ordre ne change
   rien au calcul (qui reste piloté par feedsFrom) — il ne sert qu'à
   l'affichage du tableau visuel.
   ---------------------------------------------------------------- */
const BRACKET_DISPLAY_ORDER = {
  r32:  ["r32_2","r32_5","r32_1","r32_3","r32_11","r32_12","r32_9","r32_10","r32_4","r32_6","r32_7","r32_8","r32_14","r32_16","r32_13","r32_15"],
  r16:  ["r16_1","r16_2","r16_5","r16_6","r16_3","r16_4","r16_7","r16_8"],
  qf:   ["qf_1","qf_2","qf_3","qf_4"],
  sf:   ["sf_1","sf_2"],
  tp:   ["tp_1"],
  final:["final_1"]
};
function orderedRound(ko, round){
  const order=BRACKET_DISPLAY_ORDER[round]||[];
  const byId={}; ko.forEach(m=>{ if(m.round===round) byId[m.id]=m; });
  return order.map(id=>byId[id]).filter(Boolean);
}

  const data=(salt||"")+"::pronos-brochard::"+(pin||"");
  try{
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(data));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){ // repli si crypto.subtle indisponible (contexte non sécurisé)
    let h=5381; for(let i=0;i<data.length;i++){ h=((h<<5)+h+data.charCodeAt(i))>>>0; } return "f"+h.toString(16);
  }
}
function matchPoints(pred, real){
  if(!pred||!real) return 0;
  const ph=num(pred.h),pa=num(pred.a),rh=num(real.h),ra=num(real.a);
  if(ph==null||pa==null||rh==null||ra==null) return 0;
  if(ph===rh&&pa===ra) return SCALE.exact;
  if(Math.sign(ph-pa)===Math.sign(rh-ra)) return SCALE.issue;
  return 0;
}
/* Vainqueur d'un match à élimination directe : équipe 1 ("home") ou 2 ("away"), ou null si indéterminé */
function knockoutWinner(v){
  if(!v) return null;
  const h=num(v.h), a=num(v.a);
  if(h==null||a==null) return null;
  if(h>a) return "home";
  if(a>h) return "away";
  const ph=num(v.pens_h), pa=num(v.pens_a);
  if(ph==null||pa==null||ph===pa) return null;
  return ph>pa ? "home" : "away";
}
/* Points d'un match de phase finale : bonne issue (selon le tour) + score exact (selon réglementaire/prolongation/pénaltys), cumulés */
function knockoutPoints(pred, real, round){
  if(!pred||!real) return {total:0,exact:0,issue:0};
  const ph=num(pred.h),pa=num(pred.a),rh=num(real.h),ra=num(real.a);
  if(ph==null||pa==null||rh==null||ra==null) return {total:0,exact:0,issue:0};
  const winR=ROUNDS[round];
  const predWinner=knockoutWinner(pred), realWinner=knockoutWinner(real);
  const issuePts = (winR && predWinner && predWinner===realWinner) ? winR.issue : 0;
  let exactPts=0;
  if(ph===rh && pa===ra){
    if(rh===ra){
      const rph=num(real.pens_h), rpa=num(real.pens_a);
      const pph=num(pred.pens_h), ppa=num(pred.pens_a);
      if(rph!=null&&rpa!=null&&pph!=null&&ppa!=null&&rph===pph&&rpa===ppa) exactPts=KO_EXACT.pens;
    } else if(real.aet){
      if(pred.aet) exactPts=KO_EXACT.aet;
    } else {
      if(!pred.aet) exactPts=KO_EXACT.reg;
    }
  }
  return { total: issuePts+exactPts, exact: exactPts>0?1:0, issue: issuePts>0?1:0 };
}
function scoreParticipant(part, official){
  const res=(official&&official.results)||{}, preds=part.preds||{};
  const ko=resolveBracket(official);
  let total=0,exact=0,issue=0;
  MATCHES.forEach(m=>{ const p=matchPoints(preds[m.id], res[m.id]); if(p===SCALE.exact)exact++; else if(p===SCALE.issue)issue++; total+=p; });
  ko.forEach(m=>{ const r=knockoutPoints(predFor(preds,m), m.result, m.round); total+=r.total; exact+=r.exact; issue+=r.issue; });
  return {total,exact,issue};
}
/* Classement trié + rangs (ex æquo) — partagé par l'espace classement et l'organisateur */
function computeRanking(pool, official){
  const scored=(pool||[]).filter(p=>p&&(p.firstName||p.lastName)).map(p=>({...p, ...scoreParticipant(p,official)}));
  scored.sort((a,b)=> b.total-a.total || ((a.lastName||"")+(a.firstName||"")+(a.email||"")).localeCompare((b.lastName||"")+(b.firstName||"")+(b.email||""),"fr"));
  let lp=null,lr=0; scored.forEach((s,i)=>{ if(s.total!==lp){lr=i+1;lp=s.total;} s.rank=lr; });
  const c={}; scored.forEach(s=>c[s.rank]=(c[s.rank]||0)+1); scored.forEach(s=>s.tie=c[s.rank]>1);
  return scored;
}
function officialHasResult(official){
  const res=(official&&official.results)||{};
  const groupHas=MATCHES.some(m=>hasScore(res[m.id]));
  const koHas=resolveBracket(official).some(m=>hasScore(m.result));
  return groupHas || koHas;
}

/* Classement d'un groupe à partir des RÉSULTATS OFFICIELS (3 pts victoire / 1 nul) */
/* Critères FIFA dans l'ordre : points, différence de buts, buts marqués,
   confrontation directe (entre 2 équipes), puis ordre alphabétique
   (à défaut de fair-play / tirage au sort en cas d'égalité totale à 3+). */
function computeGroupStandings(g, results){
  const table={}; GROUPS[g].forEach(t=>table[t]={team:t,pts:0,gf:0,ga:0,w:0,d:0,l:0,p:0});
  const h2h={}; // h2h[A][B] = points pris par A face à B
  matchesOfGroup(g).forEach(m=>{
    const v=(results||{})[m.id];
    const h=num(v&&v.h), a=num(v&&v.a);
    if(h==null||a==null) return;
    const H=table[m.home],A=table[m.away];
    H.p++; A.p++; H.gf+=h; H.ga+=a; A.gf+=a; A.ga+=h;
    if(h>a){ H.w++; H.pts+=3; A.l++; }
    else if(h<a){ A.w++; A.pts+=3; H.l++; }
    else { H.d++; A.d++; H.pts++; A.pts++; }
    h2h[m.home]=h2h[m.home]||{}; h2h[m.away]=h2h[m.away]||{};
    h2h[m.home][m.away]= h>a?3:(h===a?1:0);
    h2h[m.away][m.home]= a>h?3:(h===a?1:0);
  });
  const arr=Object.values(table);
  arr.sort((x,y)=>{
    if(y.pts!==x.pts) return y.pts-x.pts;
    const xd=x.gf-x.ga, yd=y.gf-y.ga;
    if(yd!==xd) return yd-xd;
    if(y.gf!==x.gf) return y.gf-x.gf;
    const xh=h2h[x.team]&&h2h[x.team][y.team], yh=h2h[y.team]&&h2h[y.team][x.team];
    if(xh!=null && yh!=null && xh!==yh) return yh-xh; // confrontation directe
    return x.team.localeCompare(y.team,"fr");
  });
  return arr;
}
function GroupTable({ g, results }){
  const rows=useMemo(()=>computeGroupStandings(g,results),[g,results]);
  const anyPlayed=rows.some(r=>r.p>0);
  return (

}

/* Arbre de phase finale — se reconstruit tout seul à chaque score officiel saisi */
/* Hauteur (en unités de base) de l'emplacement d'un match selon son tour : elle DOUBLE
   à chaque tour (16es=1, 8es=2, quarts=4, demies=8, finale=16). Comme le match est
   toujours centré dans son emplacement, ça place mathématiquement chaque case
   exactement à mi-hauteur de ses deux matchs précédents — sans aucun calcul pixel
   à la main, et les connecteurs CSS (::after) se branchent automatiquement au bon endroit. */
const BRACKET_ROUNDS_ORDER=["r32","r16","qf","sf","final"];
function BracketTree({ official }){
  const ko=useMemo(()=>resolveBracket(official),[official]);
  const MATCH_H=56, GAP=10, UNIT=MATCH_H+GAP;
  const tp=ko.find(m=>m.round==="tp");
  const box=m=>{
    const res=m.result||{};
    const w=knockoutWinner(res);
    const hScore = (res.h!==""&&res.h!=null) ? res.h : null;
    const aScore = (res.a!==""&&res.a!=null) ? res.a : null;
    return (
      <div className="bracket__match">
        <div className={"bracket__team"+(w==="home"?" win":"")}>
          <span>{m.home ? `${flag(m.home)} ${m.home}` : "À déterminer"}</span>
          {hScore!=null && <b>{hScore}</b>}
        </div>
        <div className={"bracket__team"+(w==="away"?" win":"")}>
          <span>{m.away ? `${flag(m.away)} ${m.away}` : "À déterminer"}</span>
          {aScore!=null && <b>{aScore}</b>}
        </div>
      </div>
    );
  };
  return (
    <div className="bracket" style={{"--bk-matchh":MATCH_H+"px"}}>
      {BRACKET_ROUNDS_ORDER.map((rk,colIdx)=>{
        const slotH=UNIT*Math.pow(2,colIdx);
        const isLast=colIdx===BRACKET_ROUNDS_ORDER.length-1;
        return (
          <div className={"bracket__col"+(isLast?" bracket__col--last":"")} key={rk}>
            <div className="bracket__roundlabel">{ROUNDS[rk].label}</div>
            <div className="bracket__matches">
              {orderedRound(ko,rk).map(m=>(
                <div className="bracket__slot" key={m.id} style={{height:slotH+"px"}}>
                  {box(m)}
                  {/* la petite finale (perdants des demies) s'affiche juste sous la finale */}
                  {isLast && tp && (
                    <div style={{position:"absolute",top:`calc(50% + ${MATCH_H/2+16}px)`,left:0,right:0}}>
                      <div className="bracket__roundlabel" style={{margin:"0 0 4px"}}>{ROUNDS.tp.label}</div>
                      {box(tp)}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

  if(!account) return (<>
    {!CLOUD_ON && (
      <div className="banner banner--warn"><span>⚠️</span><span><b>Mode local (test) :</b> Firebase n'est pas encore configuré, les pronostics restent sur cet appareil. Voir le README pour activer le partage entre tous les participants.</span></div>
    )}
    <LoginGate onLogin={login}/>
    <ScaleCard/>
  </>);

  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;

  return (<>
    {!CLOUD_ON && (
      <div className="banner banner--warn"><span>⚠️</span><span><b>Mode local (test) :</b> Firebase n'est pas encore configuré, les pronostics restent sur cet appareil. Voir le README pour activer le partage entre tous les participants.</span></div>
    )}

    <div className="card">
      <h2 className="section-title">🎯 Mes pronostics</h2>
      <p className="section-sub">Connecté en tant que <b>{me.firstName} {me.lastName}</b> <span style={{color:"var(--muted)"}}>({me.email})</span>.
        Pronostique les <b>scores</b> — tout est <b>sauvegardé automatiquement</b>. Chaque match se <b>ferme à son coup d'envoi</b>.</p>
      <button className="btn btn--ghost btn--sm" onClick={logout}>↪ Changer de participant</button>
      <div className="saved">{saved}</div>
    </div>

    <div className="card">
      <div className="subtabs">
        <button className={"subtab"+(phase===1?" on":"")} onClick={()=>setPhase(1)}>① Phase de poules</button>
        <button className={"subtab"+(phase===2?" on":"")} onClick={()=>setPhase(2)}>② Phase finale</button>
      </div>

      {phase===1 && (<>
        <div style={{fontSize:13,fontWeight:600}}>Progression : {filled1}/{MATCHES.length} matchs</div>
        <div className="progress"><i style={{width:pct1+"%"}}></i></div>
        <GroupGrid values={me.preds} onSet={setPred} now={now} lockable={true} results={official.results} />
      </>)}

      {phase===2 && (<>
        <BracketTree official={official} />
        {ko.length===0
          ? <div className="banner banner--info"><span>⏳</span><span>La <b>phase finale</b> n'est pas encore ouverte. Les matchs apparaîtront ici dès que les qualifiés seront connus (fin des poules).</span></div>
          : <div>
              {ko.map(m=> <div className="ko-card" key={m.id}><MatchRow m={m} val={predFor(me.preds,m)} onSet={setPred} now={now} lockable={true} /></div>)}
            </div>}
      </>)}
    </div>

    <ScaleCard/>
  </>);
}

/* ================================================================
   CLASSEMENT (présentation, partagé)
   ================================================================ */
function Leaderboard({ ranking, hasResult }){
  if(ranking.length===0) return <div className="banner banner--info"><span>ℹ️</span><span>Aucun participant pour l'instant.</span></div>;
  if(!hasResult) return <div className="banner banner--warn"><span>⏳</span><span><b>Aucun résultat officiel saisi.</b> Le classement s'affichera dès le premier score renseigné.</span></div>;
  return (<>
    <p className="section-sub">Mise à jour en direct. Ex æquo = même rang.</p>
    {ranking.map((r,i)=>(
      <div className={"lb-row "+(r.rank===1?"top1":r.rank===2?"top2":r.rank===3?"top3":"")} key={i}>
        <div className="lb-rank">{medal(r.rank)||r.rank}</div>
        <div>
          <div className="lb-name">{r.firstName} {r.lastName}{r.tie && <span className="exaequo">EX ÆQUO</span>}</div>
          <div className="lb-detail">{r.email?maskEmail(r.email)+" · ":""}{r.exact} score(s) exact(s) · {r.issue} bonne(s) issue(s)</div>
        </div>
        <div className="lb-pts">{r.total}<small>points</small></div>
      </div>
    ))}
  </>);
}

/* Classement côté ORGANISATEUR : e-mail complet + suppression participant + effacement d'un pronostic */
function AdminPredRow({ id, v, m, onClearPred, onSetPred }){
  const [editing,setEditing]=useState(false);
  const [eh,setEh]=useState(v.h??"");
  const [ea,setEa]=useState(v.a??"");
  if(editing){
    return (
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 2px",borderBottom:"1px dashed var(--line)"}}>
        <span style={{flex:1,fontSize:13,color:"var(--night)"}}>{m?`${flag(m.home)} ${m.home} — ${m.away} ${flag(m.away)}`:id}</span>
        <input type="number" min="0" max="30" style={{width:44,textAlign:"center"}} value={eh} onChange={e=>setEh(e.target.value)} aria-label="buts domicile" />
        <span>–</span>
        <input type="number" min="0" max="30" style={{width:44,textAlign:"center"}} value={ea} onChange={e=>setEa(e.target.value)} aria-label="buts extérieur" />
        <button className="btn btn--ghost btn--sm" title="Enregistrer" onClick={()=>{ onSetPred(id, {...v, h:eh, a:ea}); setEditing(false); }}>💾</button>
        <button className="btn btn--ghost btn--sm" title="Annuler" onClick={()=>{ setEh(v.h??""); setEa(v.a??""); setEditing(false); }}>✕</button>
      </div>
    );
  }
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 2px",borderBottom:"1px dashed var(--line)"}}>
      <span style={{flex:1,fontSize:13,color:"var(--night)"}}>{m?`${flag(m.home)} ${m.home} — ${m.away} ${flag(m.away)}`:id}</span>
      <b style={{minWidth:42,textAlign:"center"}}>{v.h}–{v.a}</b>
      <button className="btn btn--ghost btn--sm" title="Corriger ce pronostic" onClick={()=>setEditing(true)}>✎</button>
      <button className="btn btn--ghost btn--sm" title="Effacer ce pronostic" onClick={()=>onClearPred(id)}>🗑️</button>
    </div>
  );
}
function AdminRanking({ ranking, matchById, onDeleteParticipant, onClearPred, onResetCode, onSetPred }){
  const [open,setOpen]=useState(null);
  if(ranking.length===0) return <div className="banner banner--info"><span>ℹ️</span><span>Aucun participant inscrit pour l'instant.</span></div>;
  return (<>
    <p className="section-sub">Clique sur un participant pour voir/éditer ses pronostics.
      <b> 🔑</b> = réinitialiser son code secret (code oublié / compte usurpé) · <b> 🗑️</b> (ligne participant) = supprimer le participant entier · <b> ✎</b> = corriger un pronostic précis (ex. saisie buguée) · <b> 🗑️</b> (ligne pronostic) = l'effacer.</p>
    {ranking.map((r,i)=>{
      const isOpen=open===(r.id||i);
      const entries=Object.entries(r.preds||{}).filter(([id,v])=>v&&((v.h!==""&&v.h!=null)||(v.a!==""&&v.a!=null)));
      return (
        <div key={r.id||i}>
          <div className={"lb-row "+(r.rank===1?"top1":r.rank===2?"top2":r.rank===3?"top3":"")}>
            <div className="lb-rank">{medal(r.rank)||r.rank}</div>
            <div style={{cursor:"pointer"}} onClick={()=>setOpen(isOpen?null:(r.id||i))}>
              <div className="lb-name">{r.firstName} {r.lastName}{r.tie && <span className="exaequo">EX ÆQUO</span>}</div>
              <div className="lb-detail">{r.email||"— sans e-mail —"} · {r.exact} exact(s) · {r.issue} issue(s) · {entries.length} prono(s) {isOpen?"▲":"▼"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="lb-pts">{r.total}<small>points</small></div>
              <button className="btn btn--ghost btn--sm" title={r.pinHash?"Réinitialiser le code secret":"Aucun code défini pour ce participant"} disabled={!r.pinHash} onClick={()=>onResetCode(r)}>🔑</button>
              <button className="btn btn--ghost btn--sm" title="Supprimer ce participant" onClick={()=>onDeleteParticipant(r)}>🗑️</button>
            </div>
          </div>
          {isOpen && (
            <div className="ko-card" style={{margin:"-2px 0 10px"}}>
              {entries.length===0
                ? <p className="hint" style={{margin:0}}>Aucun pronostic saisi par ce participant.</p>
                : entries.map(([id,v])=> <AdminPredRow key={id} id={id} v={v} m={matchById[id]} onClearPred={mid=>onClearPred(r.id,mid)} onSetPred={(mid,val)=>onSetPred(r.id,mid,val)} />)
              }
            </div>
          )}
        </div>
      );
    })}
  </>);
}

/* Onglet public : suivi du classement en direct (sans mot de passe) */
function RankingSpace(){
  const [loaded,setLoaded]=useState(false);
  const [official,setOfficial]=useState({ results:{}, koTeams:{}, koKo:{} });
  const [pool,setPool]=useState([]);
  useEffect(()=>{
    const u1=DB.watchOfficial(o=>{ setOfficial({results:{},koTeams:{},koKo:{},...o}); setLoaded(true); });
    const u2=DB.watchAll(list=> setPool(list||[]) );
    const t=setTimeout(()=>setLoaded(true),1200);
    return ()=>{ u1&&u1(); u2&&u2(); clearTimeout(t); };
  },[]);
  const ranking=useMemo(()=>computeRanking(pool,official),[pool,official]);
  const hasResult=useMemo(()=>officialHasResult(official),[official]);
  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;
  return (
    <div className="card">
      <h2 className="section-title">📊 Classement</h2>
      <p className="section-sub">{pool.length} participant(s){CLOUD_ON?" · base partagée en direct":""}. Le classement progresse à chaque résultat officiel saisi par l'organisateur.</p>
      <Leaderboard ranking={ranking} hasResult={hasResult} />
    </div>
  );
}

/* ================================================================
   ESPACE ADMIN
   ================================================================ */
function AdminSpace({ showToast }){
  const [authed,setAuthed]=useState(false);
  const [pwd,setPwd]=useState(""); const [pwdErr,setPwdErr]=useState(false);
  if(!authed) return (
    <div className="card">
      <h2 className="section-title">🔐 Espace organisateur</h2>
      <p className="section-sub">Accès réservé.</p>
      <form onSubmit={e=>{e.preventDefault(); if(pwd===ADMIN_PASSWORD)setAuthed(true); else{setPwdErr(true);showToast("Mot de passe incorrect ⛔");}}}>
        <div className="field"><label>Mot de passe <span className="req">*</span></label>
          <input type="password" value={pwd} className={pwdErr?"invalid":""} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} placeholder="••••••••" autoFocus />
          {pwdErr && <div className="err-msg">Mot de passe incorrect.</div>}</div>
        <button type="submit" className="btn btn--gold">Déverrouiller</button>
      </form>
    </div>
  );
  return <AdminPanel showToast={showToast} />;
}

/* Espace organisateur : saisie des 16 affiches de 16es + scores. L'arbre (8es, quarts, demies, finale)
   se déduit automatiquement des vainqueurs, via resolveBracket(). */
function AdminKnockout({ official, persist, setResult, now }){
  const ko=useMemo(()=>resolveBracket(official),[official]);
  const koTeams=official.koTeams||{};
  const koKo=official.koKo||{};
  const updTeam=(id,side,val)=>{ const nt={...koTeams,[id]:{...(koTeams[id]||{}),[side]:val}}; persist({...official,koTeams:nt}); };
  const updKoDate=(id,val)=>{ const nk={...koKo,[id]:val}; persist({...official,koKo:nk}); };

  const r32=ko.filter(m=>m.round==="r32");
  const assigned=r32.flatMap(m=>[m.home,m.away]).filter(Boolean);
  const seen=new Set(), dupSet=new Set();
  assigned.forEach(t=>{ if(seen.has(t)) dupSet.add(t); seen.add(t); });

  return (
    <div className="card">
      <h2 className="section-title">🏆 Phase finale</h2>
      <p className="section-sub">Renseigne les <b>16 affiches des 16es de finale</b> (équipes) ci-dessous.
        Les tours suivants (8es, quarts, demies, petite finale, finale) se <b>construisent automatiquement</b> dès que tu saisis
        le score d'un match : le vainqueur avance tout seul à la case suivante de l'arbre
        (et les <b>perdants des demies</b> se retrouvent en petite finale).</p>

      {dupSet.size>0 && (
        <div className="banner banner--err"><span>⚠️</span><span><b>Doublon détecté :</b> {Array.from(dupSet).join(", ")} apparaî(ssen)t plusieurs fois dans les 16es. Corrige avant de continuer.</span></div>
      )}
      {dupSet.size===0 && assigned.length<32 && (
        <div className="banner banner--warn"><span>⏳</span><span>{assigned.length}/32 équipes renseignées dans les 16es de finale.</span></div>
      )}
      {dupSet.size===0 && assigned.length===32 && (
        <div className="banner banner--info"><span>✅</span><span>Les 32 équipes des 16es de finale sont renseignées, sans doublon.</span></div>
      )}

      <BracketTree official={official} />

      <div className="divider"/>
      {Object.keys(ROUNDS).map(rk=>(
        <div key={rk}>
          <p className="section-sub" style={{margin:"14px 0 6px"}}><b>{ROUNDS[rk].label}</b></p>
          {orderedRound(ko,rk).map(m=>(
            <div className="ko-card" key={m.id}>
              {rk==="r32" && (
                <div className="grid2">
                  <div className="field"><label>Équipe 1</label><TeamSelect value={(koTeams[m.id]&&koTeams[m.id].home)||m.home} onChange={v=>updTeam(m.id,"home",v)} placeholder="— Choisir —" /></div>
                  <div className="field"><label>Équipe 2</label><TeamSelect value={(koTeams[m.id]&&koTeams[m.id].away)||m.away} onChange={v=>updTeam(m.id,"away",v)} placeholder="— Choisir —" /></div>
                </div>
              )}
              <p className="hint" style={{margin:"0 0 10px"}}>
                📅 Coup d'envoi officiel : <b>{m.ko ? fmt(m.ko) : "à confirmer"}</b>
                {" "}<button type="button" className="btn btn--ghost btn--sm" style={{padding:"2px 8px",fontSize:11,marginLeft:6}} onClick={()=>{ const v=window.prompt("Nouvelle date/heure de coup d'envoi (format AAAA-MM-JJTHH:MM, heure UTC)", m.ko||""); if(v!=null) updKoDate(m.id, v); }}>modifier</button>
              </p>
              <div className="field"><label>Score officiel (laisser vide si non joué)</label>
                <MatchRow m={m} val={m.result} onSet={setResult} now={now} lockable={false} /></div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function AdminPanel({ showToast }){
  const now=useNow();
  const [loaded,setLoaded]=useState(false);
  const [official,setOfficial]=useState({ results:{}, koTeams:{}, koKo:{} });
  const [pool,setPool]=useState([]);
  const [view,setView]=useState("results"); // results | knockout | ranking
  const saveTimer=useRef(null);
  const hydrated=useRef(false);

  useEffect(()=>{
    const u1=DB.watchOfficial(o=>{ if(!hydrated.current){ setOfficial({results:{},koTeams:{},koKo:{},...o}); hydrated.current=true; } setLoaded(true); });
    const u2=DB.watchAll(list=> setPool(list||[]) );
    const t=setTimeout(()=>setLoaded(true),1200);
    return ()=>{ u1&&u1(); u2&&u2(); clearTimeout(t); };
  },[]);

  const persist=(next)=>{ setOfficial(next); clearTimeout(saveTimer.current); saveTimer.current=setTimeout(()=>{ DB.saveOfficial(next); },500); };
  const setResult=useCallback((id,side,val)=>setOfficial(o=>{ const n={...o,results:{...o.results,[id]:{...(o.results[id]||{h:"",a:""}),[side]:val}}}; clearTimeout(saveTimer.current); saveTimer.current=setTimeout(()=>DB.saveOfficial(n),500); return n; }),[]);

  const resCount=MATCHES.filter(m=>hasScore(official.results[m.id])).length;
  const bracket=useMemo(()=>resolveBracket(official),[official]);
  const hasResult = resCount>0 || bracket.some(m=>hasScore(m.result));

  const ranking=useMemo(()=>computeRanking(pool,official),[pool,official]);
  const matchById=useMemo(()=>{ const mp={}; MATCHES.forEach(m=>mp[m.id]=m); bracket.forEach(m=>{ mp[m.id]=m; if(m.legacyId) mp[m.legacyId]=m; }); return mp; },[bracket]);

  const removeParticipant=async(r)=>{
    if(!r||!r.id){ showToast("Participant introuvable ⛔"); return; }
    if(!window.confirm(`Supprimer définitivement ${r.firstName||""} ${r.lastName||""} (${r.email||r.id}) et TOUS ses pronostics ?`)) return;
    await DB.deleteParticipant(r.id);
    setPool(p=>p.filter(x=>x.id!==r.id));
    showToast("Participant supprimé 🗑️");
  };
  const clearOnePred=async(id,matchId)=>{
    if(!id){ showToast("Action impossible ⛔"); return; }
    await DB.clearPred(id, matchId);
    setPool(p=>p.map(x=>{ if(x.id!==id) return x; const np={...(x.preds||{})}; delete np[matchId]; return {...x,preds:np}; }));
    showToast("Pronostic effacé ✕");
  };
  const setOnePred=async(id,matchId,value)=>{
    if(!id){ showToast("Action impossible ⛔"); return; }
    await DB.setPred(id, matchId, value);
    setPool(p=>p.map(x=>{ if(x.id!==id) return x; return {...x,preds:{...(x.preds||{}),[matchId]:value}}; }));
    showToast("Pronostic corrigé ✎");
  };
  const resetCode=async(r)=>{
    if(!r||!r.id){ showToast("Participant introuvable ⛔"); return; }
    if(!window.confirm(`Réinitialiser le code secret de ${r.firstName||""} ${r.lastName||""} (${r.email||r.id}) ?\n\nSes pronostics sont CONSERVÉS. À sa prochaine connexion, il choisira un nouveau code.`)) return;
    await DB.resetCode(r.id);
    setPool(p=>p.map(x=>x.id===r.id?{...x, pinHash:undefined}:x));
    showToast("Code réinitialisé 🔑");
  };

  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;

  return (<>
    <div className="card">
      <h2 className="section-title">🛠️ Organisateur</h2>
      <p className="section-sub">{CLOUD_ON ? "Connecté à la base partagée." : "Mode local (Firebase non configuré)."} {pool.length} participant(s).</p>
      <div className="subtabs">
        <button className={"subtab"+(view==="results"?" on":"")} onClick={()=>setView("results")}>⚽ Résultats poules</button>
        <button className={"subtab"+(view==="knockout"?" on":"")} onClick={()=>setView("knockout")}>🏆 Phase finale</button>
        <button className={"subtab"+(view==="ranking"?" on":"")} onClick={()=>setView("ranking")}>📊 Classement</button>
      </div>
    </div>

    {view==="results" && (
      <div className="card">
        <h2 className="section-title">⚽ Résultats officiels — poules</h2>
        <p className="section-sub">{resCount}/{MATCHES.length} renseignés. Sauvegarde automatique. Les matchs vides sont ignorés.</p>
        <GroupGrid values={official.results} onSet={setResult} now={now} lockable={false} results={official.results} />
      </div>
    )}

    {view==="knockout" && (
      <AdminKnockout official={official} persist={persist} setResult={setResult} now={now} />
    )}

    {view==="ranking" && (
      <div className="card">
        <h2 className="section-title">📊 Classement &amp; participants</h2>
        <AdminRanking ranking={ranking} matchById={matchById} onDeleteParticipant={removeParticipant} onClearPred={clearOnePred} onSetPred={setOnePred} onResetCode={resetCode} />
      </div>
    )}
  </>);
}

/* ================================================================
   RACINE
   ================================================================ */
function App(){
  const [tab,setTab]=useState("player");
  const [toast,setToast]=useState(""); const timer=useRef(null);
  const showToast=msg=>{ setToast(msg); clearTimeout(timer.current); timer.current=setTimeout(()=>setToast(""),3200); };
  return (<>
    <header className="topbar"><div className="topbar__inner">
      <div className="crest">🏆</div>
      <div className="brand">
        <h1>Pronostics <span className="accent">Coupe du Monde 2026</span></h1>
        <p>{ORG_NAME} · poules &amp; phase finale</p>
      </div>
    </div></header>
    <nav className="tabs">
      <button className={"tab "+(tab==="player"?"is-active":"")} onClick={()=>setTab("player")}>🎯 Je joue</button>
      <button className={"tab "+(tab==="ranking"?"is-active":"")} onClick={()=>setTab("ranking")}>📊 Classement</button>
      <button className={"tab "+(tab==="admin"?"is-active":"")} onClick={()=>setTab("admin")}>🔐 Organisateur</button>
    </nav>
    <main>
      {tab==="player" && <PlayerSpace showToast={showToast}/>}
      {tab==="ranking" && <RankingSpace/>}
      {tab==="admin" && <AdminSpace showToast={showToast}/>}
      <div className="footer-note">Jeu interne · {ORG_NAME}</div>
    </main>
    <div className={"toast "+(toast?"show":"")}>{toast}</div>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
