const LS = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
const PART_COL = NS + "participants";   // collection Firestore des participants (namespacée)
const CONF_COL = NS + "config";          // collection Firestore de config (namespacée)
const DB = {
  watchMe(uid, cb){
    if(db) return db.collection(PART_COL).doc(uid).onSnapshot(s=>cb(s.exists?s.data():null), e=>console.warn(e));
    cb(LS.get(NS+"me_"+uid)); return ()=>{};
  },
  async saveMe(uid, data){
    if(db) return db.collection(PART_COL).doc(uid).set(data,{merge:true});
    const prev=LS.get(NS+"me_"+uid)||{}; LS.set(NS+"me_"+uid, {...prev, ...data}); // fusion (préserve les pronos déjà saisis)
  },
  async getMe(uid){ // lecture ponctuelle d'un compte (vérification du code secret à la connexion)
    if(db){ const s=await db.collection(PART_COL).doc(uid).get(); return s.exists?s.data():null; }
    return LS.get(NS+"me_"+uid)||null;
  },
  watchAll(cb){
    if(db) return db.collection(PART_COL).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))), e=>console.warn(e));
    const all=[]; const pfx=NS+"me_"; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(pfx)===0){ const v=LS.get(k); if(v) all.push({id:k.slice(pfx.length),...v}); } } cb(all); return ()=>{};
  },
  async deleteParticipant(id){
    if(db) return db.collection(PART_COL).doc(id).delete();
    LS.del(NS+"me_"+id);
  },
  async clearPred(id, matchId){
    if(db) return db.collection(PART_COL).doc(id).update({["preds."+matchId]: firebase.firestore.FieldValue.delete()});
    const me=LS.get(NS+"me_"+id); if(me&&me.preds){ delete me.preds[matchId]; LS.set(NS+"me_"+id, me); }
  },
  async resetCode(id){ // organisateur : efface le code secret (pronos conservés), le compte est de nouveau réclamable
    if(db) return db.collection(PART_COL).doc(id).update({pinHash: firebase.firestore.FieldValue.delete()});
    const me=LS.get(NS+"me_"+id); if(me){ delete me.pinHash; LS.set(NS+"me_"+id, me); }
  },
  watchOfficial(cb){
    if(db) return db.collection(CONF_COL).doc("official").onSnapshot(s=>cb(s.exists?s.data():{results:{},knockout:[]}), e=>console.warn(e));
    cb(LS.get(NS+"official")||{results:{},knockout:[]}); return ()=>{};
  },
  async saveOfficial(data){
    if(db) return db.collection(CONF_COL).doc("official").set(data,{merge:true});
    LS.set(NS+"official", data);
  }
};

/* Utilitaires */
const cleanName=s=>(s||"").trim().replace(/\s+/g," ");
const norm=s=>cleanName(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const num=v=>(v===""||v==null)?null:Number(v);
/* Identité par e-mail (anti-doublons + même compte sur tous les appareils) */
const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const emailKey=e=>norm(e).replace(/[.#$\[\]\/@]/g,"_");
function maskEmail(e){ const s=cleanName(e); const i=s.indexOf("@"); if(i<1) return s; const u=s.slice(0,i), d=s.slice(i+1); const um=u.length<=2?u[0]+"…":u.slice(0,2)+"…"; return um+"@"+d; }
/* Code secret (PIN) : haché SHA-256 + salé par l'e-mail. Jamais stocké en clair, jamais affiché. */
async function hashPin(pin, salt){
  const data=(salt||"")+"::pronos-brochard::"+(pin||"");
  try{
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(data));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){ // repli si crypto.subtle indisponible (contexte non sécurisé)
    let h=5381; for(let i=0;i<data.length;i++){ h=((h<<5)+h+data.charCodeAt(i))>>>0; } return "f"+h.toString(16);
  }
}
function matchPoints(pred, real){
  if(!pred||!real) return 0;
  const ph=num(pred.h),pa=num(pred.a),rh=num(real.h),ra=num(real.a);
  if(ph==null||pa==null||rh==null||ra==null) return 0;
  if(ph===rh&&pa===ra) return SCALE.exact;
  if(Math.sign(ph-pa)===Math.sign(rh-ra)) return SCALE.issue;
  return 0;
}
function scoreParticipant(part, official){
  const res=(official&&official.results)||{}, preds=part.preds||{};
  const all=[...MATCHES, ...(((official&&official.knockout))||[])];
  let total=0,exact=0,issue=0;
  all.forEach(m=>{ const p=matchPoints(preds[m.id], res[m.id]); if(p===SCALE.exact)exact++; else if(p===SCALE.issue)issue++; total+=p; });
  return {total,exact,issue};
}
/* Classement trié + rangs (ex æquo) — partagé par l'espace classement et l'organisateur */
function computeRanking(pool, official){
  const scored=(pool||[]).filter(p=>p&&(p.firstName||p.lastName)).map(p=>({...p, ...scoreParticipant(p,official)}));
  scored.sort((a,b)=> b.total-a.total || ((a.lastName||"")+(a.firstName||"")+(a.email||"")).localeCompare((b.lastName||"")+(b.firstName||"")+(b.email||""),"fr"));
  let lp=null,lr=0; scored.forEach((s,i)=>{ if(s.total!==lp){lr=i+1;lp=s.total;} s.rank=lr; });
  const c={}; scored.forEach(s=>c[s.rank]=(c[s.rank]||0)+1); scored.forEach(s=>s.tie=c[s.rank]>1);
  return scored;
}
function officialHasResult(official){
  const res=(official&&official.results)||{};
  const all=[...MATCHES, ...(((official&&official.knockout))||[])];
  return all.some(m=>{ const v=res[m.id]; return v&&v.h!==""&&v.h!=null&&v.a!==""&&v.a!=null; });
}
const medal=r=>r===1?"🥇":r===2?"🥈":r===3?"🥉":"";

function LoginGate({ onLogin }){
  const [first,setFirst]=useState("");
  const [last,setLast]=useState("");
  const [email,setEmail]=useState("");
  const [pin,setPin]=useState("");
  const [err,setErr]=useState({});
  const [busy,setBusy]=useState(false);
  async function submit(e){
    e.preventDefault();
    const er={};
    if(cleanName(first).length<2) er.first="Prénom requis.";
    if(cleanName(last).length<2)  er.last="Nom requis.";
    if(!emailRe.test(cleanName(email))) er.email="Adresse e-mail invalide.";
    if(cleanName(pin).length<4)   er.pin="Code d'au moins 4 caractères.";
    setErr(er);
    if(Object.keys(er).length) return;
    setBusy(true);
    let res;
    try{ res=await onLogin(cleanName(first), cleanName(last), cleanName(email), cleanName(pin)); }
    catch(e){ res={error:"Erreur de connexion, réessaie."}; }
    setBusy(false);
    if(res && res.error) setErr({pin:res.error});
  }
  return (
    <div className="card">
      <h2 className="section-title">🎯 Inscription</h2>
      <p className="section-sub">Indique ton <b>prénom</b>, ton <b>nom</b>, ton <b>e-mail</b> et un <b>code secret</b> pour accéder à tes pronostics.
        Ton e-mail est ton <b>identifiant unique</b> : utilise le <b>même</b> sur tous tes appareils pour retrouver tes pronos.
        À ta première connexion, ton code secret est <b>enregistré</b> ; ensuite il sera <b>demandé</b> pour t'identifier et empêcher qu'on joue à ta place.</p>
      <form onSubmit={submit}>
        <div className="grid2">
          <div className="field"><label>Prénom <span className="req">*</span></label>
            <input type="text" value={first} className={err.first?"invalid":""} onChange={e=>setFirst(e.target.value)} placeholder="Camille" autoFocus />
            {err.first && <div className="err-msg">{err.first}</div>}</div>
          <div className="field"><label>Nom <span className="req">*</span></label>
            <input type="text" value={last} className={err.last?"invalid":""} onChange={e=>setLast(e.target.value)} placeholder="Dupont" />
            {err.last && <div className="err-msg">{err.last}</div>}</div>
        </div>
        <div className="field"><label>Adresse e-mail <span className="req">*</span></label>
          <input type="text" inputMode="email" value={email} className={err.email?"invalid":""} onChange={e=>setEmail(e.target.value)} placeholder="camille.dupont@brochard.fr" />
          {err.email && <div className="err-msg">{err.email}</div>}
          <div className="hint">Sert uniquement à identifier tes pronostics et éviter les doublons.</div></div>
        <div className="field"><label>Code secret <span className="req">*</span></label>
          <input type="password" autoComplete="current-password" value={pin} className={err.pin?"invalid":""} onChange={e=>setPin(e.target.value)} placeholder="Au moins 4 caractères" />
          {err.pin && <div className="err-msg">{err.pin}</div>}
          <div className="hint">Choisis-le à ta première connexion et retiens-le : il te protège et sera redemandé sur un nouvel appareil.</div></div>
        <button type="submit" className="btn" disabled={busy}>{busy?"Connexion…":"Accéder à mes pronostics →"}</button>
      </form>
    </div>
  );
}

function PlayerSpace({ showToast }){
  const now = useNow();
  const [account,setAccount]=useState(()=>{ try{ return localStorage.getItem(NS+"brochard_email")||""; }catch(e){ return ""; } });
  const [loaded,setLoaded]=useState(false);
  const [me,setMe]=useState({ firstName:"", lastName:"", email:"", preds:{} });
  const [official,setOfficial]=useState({ results:{}, knockout:[] });
  const [phase,setPhase]=useState(1);
  const [saved,setSaved]=useState("");
  const hydrated=useRef(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    if(!account){ setLoaded(true); return; }
    hydrated.current=false; setLoaded(false);
    const u1=DB.watchMe(account, d=>{ if(!hydrated.current){ if(d) setMe(m=>({...m,...d})); hydrated.current=true; setLoaded(true); } });
    const u2=DB.watchOfficial(o=> setOfficial({results:{},knockout:[],...o}) );
    const t=setTimeout(()=>setLoaded(true),1200);
    return ()=>{ u1&&u1(); u2&&u2(); clearTimeout(t); };
  },[account]);

  async function login(first, last, email, pin){
    const key=emailKey(email);
    const pinHash=await hashPin(pin, key);
    let existing=null;
    try{ existing=await DB.getMe(key); }catch(e){}
    if(existing && existing.pinHash){
      // compte déjà protégé : le code doit correspondre, sinon accès refusé
      if(existing.pinHash!==pinHash) return { error:"Code secret incorrect pour cet e-mail." };
    }
    try{ localStorage.setItem(NS+"brochard_email", key); }catch(e){}
    hydrated.current=false;
    setMe(m=>({ ...m, firstName:first, lastName:last, email }));
    setAccount(key);
    // crée/réclame le compte avec son code (fusion : préserve les pronos déjà saisis)
    DB.saveMe(key, { firstName:first, lastName:last, email, pinHash });
    showToast("Bienvenue "+first+" 👋");
    return { ok:true };
  }
  function logout(){ try{ localStorage.removeItem(NS+"brochard_email"); }catch(e){} hydrated.current=false; setMe({firstName:"",lastName:"",email:"",preds:{}}); setAccount(""); }

  const setPred=useCallback((id,side,val)=>setMe(s=>{
    const n={...s,preds:{...s.preds,[id]:{...(s.preds[id]||{h:"",a:""}),[side]:val}}};
    clearTimeout(saveTimer.current); saveTimer.current=setTimeout(async()=>{ await DB.saveMe(account,n); setSaved("✓ enregistré"); setTimeout(()=>setSaved(""),1500); },700);
    return n;
  }),[account]);

  const ko = official.knockout||[];
  const filled1=MATCHES.filter(m=>{const v=me.preds[m.id];return v&&v.h!==""&&v.h!=null&&v.a!==""&&v.a!=null;}).length;
  const pct1=Math.round(filled1/MATCHES.length*100);

  if(!account) return (<>
    {!CLOUD_ON && (
      <div className="banner banner--warn"><span>⚠️</span><span><b>Mode local (test) :</b> Firebase n'est pas encore configuré, les pronostics restent sur cet appareil. Voir le README pour activer le partage entre tous les participants.</span></div>
    )}
    <LoginGate onLogin={login}/>
    <ScaleCard/>
  </>);

  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;

  return (<>
    {!CLOUD_ON && (
      <div className="banner banner--warn"><span>⚠️</span><span><b>Mode local (test) :</b> Firebase n'est pas encore configuré, les pronostics restent sur cet appareil. Voir le README pour activer le partage entre tous les participants.</span></div>
    )}

    <div className="card">
      <h2 className="section-title">🎯 Mes pronostics</h2>
      <p className="section-sub">Connecté en tant que <b>{me.firstName} {me.lastName}</b> <span style={{color:"var(--muted)"}}>({me.email})</span>.
        Pronostique les <b>scores</b> — tout est <b>sauvegardé automatiquement</b>. Chaque match se <b>ferme à son coup d'envoi</b>.</p>
      <button className="btn btn--ghost btn--sm" onClick={logout}>↪ Changer de participant</button>
      <div className="saved">{saved}</div>
    </div>

    <div className="card">
      <div className="subtabs">
        <button className={"subtab"+(phase===1?" on":"")} onClick={()=>setPhase(1)}>① Phase de poules</button>
        <button className={"subtab"+(phase===2?" on":"")} onClick={()=>setPhase(2)}>② Phase finale</button>
      </div>

      {phase===1 && (<>
        <div style={{fontSize:13,fontWeight:600}}>Progression : {filled1}/{MATCHES.length} matchs</div>
        <div className="progress"><i style={{width:pct1+"%"}}></i></div>
        <GroupGrid values={me.preds} onSet={setPred} now={now} lockable={true} />
      </>)}

      {phase===2 && (
        ko.length===0
          ? <div className="banner banner--info"><span>⏳</span><span>La <b>phase finale</b> n'est pas encore ouverte. Les matchs apparaîtront ici dès que les qualifiés seront connus (fin des poules).</span></div>
          : <div>
              {ko.map(m=> <div className="ko-card" key={m.id}><MatchRow m={m} val={me.preds[m.id]} onSet={setPred} now={now} lockable={true} /></div>)}
            </div>
      )}
    </div>

    <ScaleCard/>
  </>);
}

    {ranking.map((r,i)=>{
      const isOpen=open===(r.id||i);
      const entries=Object.entries(r.preds||{}).filter(([id,v])=>v&&((v.h!==""&&v.h!=null)||(v.a!==""&&v.a!=null)));
      return (
        <div key={r.id||i}>
          <div className={"lb-row "+(r.rank===1?"top1":r.rank===2?"top2":r.rank===3?"top3":"")}>
            <div className="lb-rank">{medal(r.rank)||r.rank}</div>
            <div style={{cursor:"pointer"}} onClick={()=>setOpen(isOpen?null:(r.id||i))}>
              <div className="lb-name">{r.firstName} {r.lastName}{r.tie && <span className="exaequo">EX ÆQUO</span>}</div>
              <div className="lb-detail">{r.email||"— sans e-mail —"} · {r.exact} exact(s) · {r.issue} issue(s) · {entries.length} prono(s) {isOpen?"▲":"▼"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="lb-pts">{r.total}<small>points</small></div>
              <button className="btn btn--ghost btn--sm" title={r.pinHash?"Réinitialiser le code secret":"Aucun code défini pour ce participant"} disabled={!r.pinHash} onClick={()=>onResetCode(r)}>🔑</button>
              <button className="btn btn--ghost btn--sm" title="Supprimer ce participant" onClick={()=>onDeleteParticipant(r)}>🗑️</button>
            </div>
          </div>
          {isOpen && (
            <div className="ko-card" style={{margin:"-2px 0 10px"}}>
              {entries.length===0
                ? <p className="hint" style={{margin:0}}>Aucun pronostic saisi par ce participant.</p>
                : entries.map(([id,v])=>{ const m=matchById[id]; return (
                    <div key={id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 2px",borderBottom:"1px dashed var(--line)"}}>
                      <span style={{flex:1,fontSize:13,color:"var(--night)"}}>{m?`${flag(m.home)} ${m.home} — ${m.away} ${flag(m.away)}`:id}</span>
                      <b style={{minWidth:42,textAlign:"center"}}>{v.h}–{v.a}</b>
                      <button className="btn btn--ghost btn--sm" title="Effacer ce pronostic" onClick={()=>onClearPred(r.id,id)}>✕</button>
                    </div>
                  ); })
              }
            </div>
          )}
        </div>
      );
    })}
  </>);
}

/* Onglet public : suivi du classement en direct (sans mot de passe) */
function RankingSpace(){
  const [loaded,setLoaded]=useState(false);
  const [official,setOfficial]=useState({ results:{}, knockout:[] });
  const [pool,setPool]=useState([]);
  useEffect(()=>{
    const u1=DB.watchOfficial(o=>{ setOfficial({results:{},knockout:[],...o}); setLoaded(true); });
    const u2=DB.watchAll(list=> setPool(list||[]) );
    const t=setTimeout(()=>setLoaded(true),1200);
    return ()=>{ u1&&u1(); u2&&u2(); clearTimeout(t); };
  },[]);
  const ranking=useMemo(()=>computeRanking(pool,official),[pool,official]);
  const hasResult=useMemo(()=>officialHasResult(official),[official]);
  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;
  return (
    <div className="card">
      <h2 className="section-title">📊 Classement</h2>
      <p className="section-sub">{pool.length} participant(s){CLOUD_ON?" · base partagée en direct":""}. Le classement progresse à chaque résultat officiel saisi par l'organisateur.</p>
      <Leaderboard ranking={ranking} hasResult={hasResult} />
    </div>
  );
}

/* ================================================================
   ESPACE ADMIN
   ================================================================ */
function AdminSpace({ showToast }){
  const [authed,setAuthed]=useState(false);
  const [pwd,setPwd]=useState(""); const [pwdErr,setPwdErr]=useState(false);
  if(!authed) return (
    <div className="card">
      <h2 className="section-title">🔐 Espace organisateur</h2>
      <p className="section-sub">Accès réservé.</p>
      <form onSubmit={e=>{e.preventDefault(); if(pwd===ADMIN_PASSWORD)setAuthed(true); else{setPwdErr(true);showToast("Mot de passe incorrect ⛔");}}}>
        <div className="field"><label>Mot de passe <span className="req">*</span></label>
          <input type="password" value={pwd} className={pwdErr?"invalid":""} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} placeholder="••••••••" autoFocus />
          {pwdErr && <div className="err-msg">Mot de passe incorrect.</div>}</div>
        <button type="submit" className="btn btn--gold">Déverrouiller</button>
      </form>
    </div>
  );
  return <AdminPanel showToast={showToast} />;
}

function AdminPanel({ showToast }){
  const now=useNow();
  const [loaded,setLoaded]=useState(false);
  const [official,setOfficial]=useState({ results:{}, knockout:[] });
  const [pool,setPool]=useState([]);
  const [view,setView]=useState("results"); // results | knockout | ranking
  const saveTimer=useRef(null);
  const hydrated=useRef(false);

  useEffect(()=>{
    const u1=DB.watchOfficial(o=>{ if(!hydrated.current){ setOfficial({results:{},knockout:[],...o}); hydrated.current=true; } setLoaded(true); });
    const u2=DB.watchAll(list=> setPool(list||[]) );
    const t=setTimeout(()=>setLoaded(true),1200);
    return ()=>{ u1&&u1(); u2&&u2(); clearTimeout(t); };
  },[]);

  const persist=(next)=>{ setOfficial(next); clearTimeout(saveTimer.current); saveTimer.current=setTimeout(()=>{ DB.saveOfficial(next); },500); };
  const setResult=useCallback((id,side,val)=>setOfficial(o=>{ const n={...o,results:{...o.results,[id]:{...(o.results[id]||{h:"",a:""}),[side]:val}}}; clearTimeout(saveTimer.current); saveTimer.current=setTimeout(()=>DB.saveOfficial(n),500); return n; }),[]);

  // Gestion des matchs de phase finale
  const addKo=()=>persist({...official, knockout:[...(official.knockout||[]), {id:"k"+Date.now(), label:"", home:"", away:"", ko:""}]});
  const updKo=(i,k,v)=>{ const arr=[...official.knockout]; arr[i]={...arr[i],[k]:v}; persist({...official,knockout:arr}); };
  const rmKo=i=>{ const arr=official.knockout.filter((_,j)=>j!==i); persist({...official,knockout:arr}); };

  const resCount=MATCHES.filter(m=>{const v=official.results[m.id];return v&&v.h!==""&&v.h!=null&&v.a!==""&&v.a!=null;}).length;
  const hasResult = resCount>0 || (official.knockout||[]).some(m=>{const v=official.results[m.id];return v&&v.h!==""&&v.a!=="";});

  const ranking=useMemo(()=>computeRanking(pool,official),[pool,official]);
  const matchById=useMemo(()=>{ const mp={}; [...MATCHES, ...(official.knockout||[])].forEach(m=>mp[m.id]=m); return mp; },[official.knockout]);

  const removeParticipant=async(r)=>{
    if(!r||!r.id){ showToast("Participant introuvable ⛔"); return; }
    if(!window.confirm(`Supprimer définitivement ${r.firstName||""} ${r.lastName||""} (${r.email||r.id}) et TOUS ses pronostics ?`)) return;
    await DB.deleteParticipant(r.id);
    setPool(p=>p.filter(x=>x.id!==r.id));
    showToast("Participant supprimé 🗑️");
  };
  const clearOnePred=async(id,matchId)=>{
    if(!id){ showToast("Action impossible ⛔"); return; }
    await DB.clearPred(id, matchId);
    setPool(p=>p.map(x=>{ if(x.id!==id) return x; const np={...(x.preds||{})}; delete np[matchId]; return {...x,preds:np}; }));
    showToast("Pronostic effacé ✕");
  };
  const resetCode=async(r)=>{
    if(!r||!r.id){ showToast("Participant introuvable ⛔"); return; }
    if(!window.confirm(`Réinitialiser le code secret de ${r.firstName||""} ${r.lastName||""} (${r.email||r.id}) ?\n\nSes pronostics sont CONSERVÉS. À sa prochaine connexion, il choisira un nouveau code.`)) return;
    await DB.resetCode(r.id);
    setPool(p=>p.map(x=>x.id===r.id?{...x, pinHash:undefined}:x));
    showToast("Code réinitialisé 🔑");
  };

  if(!loaded) return <div className="card"><p style={{textAlign:"center",color:"var(--muted)"}}>Chargement…</p></div>;

  return (<>
    <div className="card">
      <h2 className="section-title">🛠️ Organisateur</h2>
      <p className="section-sub">{CLOUD_ON ? "Connecté à la base partagée." : "Mode local (Firebase non configuré)."} {pool.length} participant(s).</p>
      <div className="subtabs">
        <button className={"subtab"+(view==="results"?" on":"")} onClick={()=>setView("results")}>⚽ Résultats poules</button>
        <button className={"subtab"+(view==="knockout"?" on":"")} onClick={()=>setView("knockout")}>🏆 Phase finale</button>
        <button className={"subtab"+(view==="ranking"?" on":"")} onClick={()=>setView("ranking")}>📊 Classement</button>
      </div>
    </div>

    {view==="results" && (
      <div className="card">
        <h2 className="section-title">⚽ Résultats officiels — poules</h2>
        <p className="section-sub">{resCount}/{MATCHES.length} renseignés. Sauvegarde automatique. Les matchs vides sont ignorés.</p>
        <GroupGrid values={official.results} onSet={setResult} now={now} lockable={false} />
      </div>
    )}

    {view==="knockout" && (
      <div className="card">
        <h2 className="section-title">🏆 Phase finale</h2>
        <p className="section-sub">Crée les matchs à élimination directe dès que les équipes sont connues
          (8es, quarts, demies, finale…). Indique les équipes + la date/heure du coup d'envoi
          (les pronostics se fermeront au coup d'envoi). Renseigne le score une fois le match joué.</p>
        {(official.knockout||[]).map((m,i)=>(
          <div className="ko-card" key={m.id}>
            <div className="field"><label>Intitulé du match</label>
              <input type="text" value={m.label} onChange={e=>updKo(i,"label",e.target.value)} placeholder="ex. 8e de finale n°1" /></div>
            <div className="grid2">
              <div className="field"><label>Équipe 1</label><TeamSelect value={m.home} onChange={v=>updKo(i,"home",v)} placeholder="— Choisir —" /></div>
              <div className="field"><label>Équipe 2</label><TeamSelect value={m.away} onChange={v=>updKo(i,"away",v)} placeholder="— Choisir —" /></div>
            </div>
            <div className="field"><label>Coup d'envoi (date &amp; heure)</label>
              <input type="datetime-local" value={m.ko} onChange={e=>updKo(i,"ko",e.target.value)} /></div>
            <div className="field"><label>Score officiel (laisser vide si non joué)</label>
              <MatchRow m={m} val={official.results[m.id]} onSet={setResult} now={now} lockable={false} /></div>
            <button className="btn btn--ghost btn--sm" onClick={()=>rmKo(i)}>Supprimer ce match</button>
          </div>
        ))}
        <button className="btn btn--sm" style={{width:"100%"}} onClick={addKo}>+ Ajouter un match de phase finale</button>
      </div>
    )}

    {view==="ranking" && (
      <div className="card">
        <h2 className="section-title">📊 Classement &amp; participants</h2>
        <AdminRanking ranking={ranking} matchById={matchById} onDeleteParticipant={removeParticipant} onClearPred={clearOnePred} onResetCode={resetCode} />
      </div>
    )}
  </>);
}

/* ================================================================
   RACINE
   ================================================================ */
function App(){
  const [tab,setTab]=useState("player");
  const [toast,setToast]=useState(""); const timer=useRef(null);
  const showToast=msg=>{ setToast(msg); clearTimeout(timer.current); timer.current=setTimeout(()=>setToast(""),3200); };
  return (<>
    <header className="topbar"><div className="topbar__inner">
      <div className="crest">🏆</div>
      <div className="brand">
        <h1>Pronostics <span className="accent">Coupe du Monde 2026</span></h1>
        <p>{ORG_NAME} · poules &amp; phase finale</p>
      </div>
    </div></header>
    <nav className="tabs">
      <button className={"tab "+(tab==="player"?"is-active":"")} onClick={()=>setTab("player")}>🎯 Je joue</button>
      <button className={"tab "+(tab==="ranking"?"is-active":"")} onClick={()=>setTab("ranking")}>📊 Classement</button>
      <button className={"tab "+(tab==="admin"?"is-active":"")} onClick={()=>setTab("admin")}>🔐 Organisateur</button>
    </nav>
    <main>
      {tab==="player" && <PlayerSpace showToast={showToast}/>}
      {tab==="ranking" && <RankingSpace/>}
      {tab==="admin" && <AdminSpace showToast={showToast}/>}
      <div className="footer-note">Jeu interne · {ORG_NAME}</div>
    </main>
    <div className={"toast "+(toast?"show":"")}>{toast}</div>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
